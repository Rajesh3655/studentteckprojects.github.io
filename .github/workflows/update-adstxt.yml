name: Update ads.txt

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-adstxt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest ads.txt from Ezoic
        run: |
          echo "Fetching latest ads.txt..."
          HTTP_STATUS=$(curl -o new_ads.txt -w "%{http_code}" -s -L "https://srv.adstxtmanager.com/19390/studenttechprojects.com")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Successfully fetched ads.txt. Updating..."
            mv new_ads.txt ads.txt
            
            # Configure Git
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Commit and push if there are changes
            git add ads.txt
            if git diff --staged --quiet; then
              echo "No changes to ads.txt"
            else
              git commit -m "chore: automated daily update of ads.txt from Ezoic"
              git push
              echo "Pushed updated ads.txt"
            fi
          else
            echo "Failed to fetch ads.txt or it doesn't exist yet. HTTP Status: $HTTP_STATUS"
            echo "Keeping the existing ads.txt file."
            exit 1 # Fail the workflow so you know it didn't update
          fi
